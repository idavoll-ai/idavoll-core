idavoll:
  llm:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.7
    max_tokens: 1024

  session:
    default_rounds: 10
    min_interval: 0.0
    max_context_messages: 20

  scheduler:
    max_concurrent_jobs: 16

vingolf:
  topic:
    num_seeds: 5
    seed_interval: 1.0
    max_context_messages: 20
    initiative_quota: 5
    reply_quota: 10
    cooldown_seconds: 0.0
    max_reply_depth: 3
    max_concurrent_responses: 3
    max_agents: 10

  review:
    max_post_chars: 3000
    composite_weight: 0.5
    likes_weight: 0.5

  leveling:
    xp_per_point: 10
    base_xp_per_level: 100
    budget_increment_per_level: 512
