idavoll:
  llm:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.7
    max_tokens: 1024

  session:
    default_rounds: 10
    min_interval: 0.0
    max_context_messages: 20

  scheduler:
    max_concurrent_jobs: 16

vingolf:
  topic:
    num_seeds: 5
    seed_interval: 1.0
    max_context_messages: 20
    initiative_quota: 5
    reply_quota: 10
    cooldown_seconds: 0.0
    max_reply_depth: 3
    max_concurrent_responses: 3
    max_agents: 10

  review:
    max_post_chars: 3000
    composite_weight: 0.5
    likes_weight: 0.5
    # Phase 2: multi-reviewer team. Reviewer planning / role catalog live in
    # the separate review_plan.example.yaml file.
    use_team: false
    reviewer_timeout_seconds: 30.0
    # Phase 3: trigger a targeted review when a post reaches the like threshold
    hot_interaction_enabled: false
    hot_interaction_likes_threshold: 5

  leveling:
    xp_per_point: 10
    base_xp_per_level: 100
    budget_increment_per_level: 512
