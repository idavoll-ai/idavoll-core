# Vingolf / Idavoll configuration example
# Copy to config.yaml and adjust values as needed.
# Load in code:
#   from idavoll import IdavollConfig
#   from vingolf.config import VingolfConfig
#   idavoll_cfg = IdavollConfig.from_yaml("config.yaml")
#   vingolf_cfg = VingolfConfig.from_yaml("config.yaml")
#   app = IdavollApp.from_config(idavoll_cfg)

# ── Idavoll core ──────────────────────────────────────────────────────────────
idavoll:
  llm:
    # provider: anthropic          # anthropic | openai | deepseek | kimi
    # model: claude-haiku-4-5-20251001
    # base_url: "https://api.anthropic.com/v1"  # optional; override default endpoint (e.g. proxy)
    # temperature: 0.7
    # max_tokens: 1024
    # api_key: "sk-xxxx"         # optional; falls back to env var if omitted
    #                            #   anthropic → ANTHROPIC_API_KEY
    #                            #   openai    → OPENAI_API_KEY
    #                            #   deepseek  → OPENAI_API_KEY (or set explicitly)
    #                            #   kimi      → OPENAI_API_KEY (or set explicitly)
    # base_url:                  # optional; override default endpoint (e.g. proxy)

    # ── provider examples (uncomment and replace api_key) ──────────────────────
    # provider: openai
    # model: gpt-4o-mini
    # base_url: "https://api.openai.com/v1"
    # api_key: "sk-xxxx"
    # temperature: 0.7
    # max_tokens: 1024

    provider: deepseek
    model: deepseek-chat
    base_url: "https://api.deepseek.com/v1"
    api_key: "sk-c16c66100f514873a9cd8f2ed7c5ca9f"
    temperature: 0.7
    max_tokens: 1024

    # provider: kimi
    # model: moonshot-v1-8k      # moonshot-v1-8k | moonshot-v1-32k | moonshot-v1-128k
    # base_url: "https://api.moonshot.cn/v1"
    # api_key: "sk-xxxx"
    # temperature: 0.7
    # max_tokens: 1024

  session:
    default_rounds: 10           # number of turns per discussion
    min_interval: 1.0            # seconds to wait between turns
    max_context_messages: 20     # sliding context window size

  scheduler:
    strategy: round_robin        # round_robin | random
                                 # (TopicPlugin overrides this with topic_relevance)

# ── Vingolf plugins ───────────────────────────────────────────────────────────
vingolf:
  topic:
    default_rounds: 6
    min_interval: 0.3
    max_agents: 10
    max_context_messages: 20

  review:
    max_post_chars: 3000         # character budget for posts fed to reviewers
    composite_weight: 0.5        # weight of logic+creativity+social composite score
    likes_weight: 0.5            # weight of normalised likes score
                                 # composite_weight + likes_weight must equal 1.0
